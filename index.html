<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 동네 아파트 실거래가 대시보드</title>
    <!-- Tailwind CSS for Layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- PapaParse for CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #0a0a0c;
            color: #ffffff;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.15) 0%, transparent 40%);
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
        }

        .point-gradient-blue {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }

        .point-gradient-purple {
            background: linear-gradient(135deg, #a855f7 0%, #8b5cf6 100%);
        }

        .text-glow-blue {
            text-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="mb-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight text-glow-blue">
                    우리 동네 아파트 <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">실거래가 대시보드</span>
                </h1>
                <p class="text-gray-400 mt-2">최신 실거래 데이터를 기반으로 한 시장 분석 보고서</p>
            </div>
            <div id="last-update" class="text-sm text-gray-500 bg-white/5 px-4 py-2 rounded-full border border-white/10">
                데이터 로딩 중...
            </div>
        </header>

        <!-- Loading State -->
        <div id="loading-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
            <div class="flex flex-col items-center gap-4">
                <div class="loading-spinner"></div>
                <p class="text-blue-400 font-medium">데이터를 분석하고 있습니다...</p>
            </div>
        </div>

        <!-- Summary Stats -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="glass-card p-6 flex flex-col items-start">
                <div class="p-3 rounded-xl bg-blue-500/10 text-blue-400 mb-4">
                    <i data-lucide="bar-chart-3"></i>
                </div>
                <span class="text-gray-400 text-sm">전체 거래 건수</span>
                <div id="stat-total-count" class="text-2xl font-bold mt-1">- 건</div>
            </div>
            <div class="glass-card p-6 flex flex-col items-start">
                <div class="p-3 rounded-xl bg-purple-500/10 text-purple-400 mb-4">
                    <i data-lucide="trending-up"></i>
                </div>
                <span class="text-gray-400 text-sm">평균 거래 금액</span>
                <div id="stat-avg-price" class="text-2xl font-bold mt-1">- 만원</div>
            </div>
            <div class="glass-card p-6 flex flex-col items-start border-blue-500/30">
                <div class="p-3 rounded-xl bg-blue-600/20 text-blue-300 mb-4">
                    <i data-lucide="award"></i>
                </div>
                <span class="text-gray-400 text-sm">최고 거래가</span>
                <div id="stat-max-price" class="text-2xl font-bold mt-1 text-blue-400">- 만원</div>
            </div>
            <div class="glass-card p-6 flex flex-col items-start border-purple-500/30">
                <div class="p-3 rounded-xl bg-purple-600/20 text-purple-300 mb-4">
                    <i data-lucide="arrow-down-circle"></i>
                </div>
                <span class="text-gray-400 text-sm">최저 거래가</span>
                <div id="stat-min-price" class="text-2xl font-bold mt-1 text-purple-400">- 만원</div>
            </div>
        </div>

        <!-- Main Content Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-8">
            <!-- Chart Container -->
            <div class="lg:col-span-2 glass-card p-6">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-xl font-bold flex items-center gap-2">
                        <i data-lucide="line-chart" class="text-blue-400"></i> 월별 평균 거래가격 추이
                    </h3>
                </div>
                <div class="h-[350px] w-full">
                    <canvas id="priceChart"></canvas>
                </div>
            </div>

            <!-- Area Analysis -->
            <div class="glass-card p-6 overflow-hidden">
                <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
                    <i data-lucide="pie-chart" class="text-purple-400"></i> 거래 단지 상위
                </h3>
                <div id="top-apartments" class="space-y-4">
                    <!-- Dynamic content -->
                </div>
            </div>
        </div>

        <!-- Data Table -->
        <div class="glass-card overflow-hidden">
            <div class="p-6 border-b border-white/10 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <h3 class="text-xl font-bold flex items-center gap-2">
                    <i data-lucide="list" class="text-blue-400"></i> 상세 거래 내역
                </h3>
                <div class="flex gap-2 w-full md:w-auto">
                    <input type="text" id="table-search" placeholder="아파트명 검색..." 
                           class="bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500 w-full md:w-64">
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead>
                        <tr class="bg-white/5 text-gray-400">
                            <th class="p-4 font-semibold">거래일자</th>
                            <th class="p-4 font-semibold">아파트명</th>
                            <th class="p-4 font-semibold">법정동</th>
                            <th class="p-4 font-semibold text-right">전용면적(㎡)</th>
                            <th class="p-4 font-semibold text-center">층</th>
                            <th class="p-4 font-semibold text-right">거래금액(만원)</th>
                            <th class="p-4 font-semibold text-center">건축년도</th>
                        </tr>
                    </thead>
                    <tbody id="transaction-table-body" class="divide-y divide-white/5">
                        <!-- Table rows injected here -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Footer -->
        <footer class="mt-16 pb-8 text-center border-t border-white/5 pt-8 text-gray-500 text-sm">
            <p>© [윤에듀케이션]. All Rights Reserved.</p>
        </footer>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTIKYIPtsh_fauXfaEROWUVBP74tW51wl1AoBNnisdnE0Jk3BQrxTh937yjgqOH9_ihHuegpdNPBlKR/pub?gid=1844086316&single=true&output=csv';
        
        let rawData = [];
        let priceChart = null;

        // Initialize icons
        lucide.createIcons();

        // Data Fetching
        async function loadData() {
            try {
                Papa.parse(CSV_URL, {
                    download: true,
                    header: true,
                    complete: function(results) {
                        rawData = results.data.filter(row => row.거래일자 && row.아파트명);
                        processAndRender(rawData);
                        document.getElementById('loading-overlay').classList.add('hidden');
                    },
                    error: function(err) {
                        console.error("CSV Loading Error:", err);
                        alert("데이터를 불러오는 중 오류가 발생했습니다.");
                    }
                });
            } catch (error) {
                console.error("Fetch Error:", error);
            }
        }

        function formatPrice(val) {
            const price = parseInt(val.replace(/,/g, ''));
            if (price >= 10000) {
                const uk = Math.floor(price / 10000);
                const man = price % 10000;
                return man === 0 ? `${uk}억` : `${uk}억 ${man.toLocaleString()}`;
            }
            return `${price.toLocaleString()}`;
        }

        function processAndRender(data) {
            // 1. Stats Calculation
            const prices = data.map(d => parseInt(d['거래금액(만원)'].replace(/,/g, ''))).filter(p => !isNaN(p));
            const avgPrice = Math.round(prices.reduce((a, b) => a + b, 0) / prices.length);
            const maxPrice = Math.max(...prices);
            const minPrice = Math.min(...prices);

            document.getElementById('stat-total-count').innerText = `${data.length.toLocaleString()} 건`;
            document.getElementById('stat-avg-price').innerText = `${formatPrice(avgPrice.toString())}`;
            document.getElementById('stat-max-price').innerText = `${formatPrice(maxPrice.toString())}`;
            document.getElementById('stat-min-price').innerText = `${formatPrice(minPrice.toString())}`;
            document.getElementById('last-update').innerText = `최종 업데이트: ${new Date().toLocaleDateString()}`;

            // 2. Table Rendering
            renderTable(data);

            // 3. Apartment Ranking Analysis
            const aptCounts = {};
            data.forEach(d => {
                aptCounts[d.아파트명] = (aptCounts[d.아파트명] || 0) + 1;
            });
            const topApts = Object.entries(aptCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 5);

            const aptContainer = document.getElementById('top-apartments');
            aptContainer.innerHTML = topApts.map(([name, count]) => `
                <div class="flex items-center justify-between p-3 bg-white/5 rounded-xl border border-white/5">
                    <span class="font-medium text-gray-300 truncate mr-2">${name}</span>
                    <span class="bg-blue-500/20 text-blue-400 text-xs px-2 py-1 rounded-md font-bold">${count}건</span>
                </div>
            `).join('');

            // 4. Monthly Chart
            renderChart(data);
        }

        function renderTable(data) {
            const tbody = document.getElementById('transaction-table-body');
            tbody.innerHTML = data.map(d => `
                <tr class="hover:bg-white/10 transition-colors group">
                    <td class="p-4 text-gray-400 font-mono">${d.거래일자}</td>
                    <td class="p-4 font-semibold text-white">${d.아파트명}</td>
                    <td class="p-4 text-gray-400">${d.법정동}</td>
                    <td class="p-4 text-right">${d['전용면적(㎡)']}</td>
                    <td class="p-4 text-center text-gray-500">${d.층}층</td>
                    <td class="p-4 text-right font-bold text-blue-400">${parseInt(d['거래금액(만원)'].replace(/,/g, '')).toLocaleString()}</td>
                    <td class="p-4 text-center text-gray-500">${d.건축년도}</td>
                </tr>
            `).join('');
        }

        function renderChart(data) {
            // Group by Month (YYYY-MM)
            const monthlyData = {};
            data.forEach(d => {
                // Assuming date format is like 20240101 or 2024.01.01
                const dateStr = d.거래일자.replace(/[^0-9]/g, '');
                const monthKey = dateStr.substring(0, 4) + '-' + dateStr.substring(4, 6);
                
                if (!monthlyData[monthKey]) {
                    monthlyData[monthKey] = { total: 0, count: 0 };
                }
                const price = parseInt(d['거래금액(만원)'].replace(/,/g, ''));
                if (!isNaN(price)) {
                    monthlyData[monthKey].total += price;
                    monthlyData[monthKey].count += 1;
                }
            });

            const sortedMonths = Object.keys(monthlyData).sort();
            const labels = sortedMonths;
            const values = sortedMonths.map(m => Math.round(monthlyData[m].total / monthlyData[m].count));

            if (priceChart) priceChart.destroy();

            const ctx = document.getElementById('priceChart').getContext('2d');
            
            // Gradient for chart
            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(59, 130, 246, 0.5)');
            gradient.addColorStop(1, 'rgba(59, 130, 246, 0)');

            priceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '평균 거래가 (만원)',
                        data: values,
                        borderColor: '#3b82f6',
                        borderWidth: 3,
                        pointBackgroundColor: '#3b82f6',
                        pointBorderColor: '#ffffff',
                        pointHoverRadius: 6,
                        fill: true,
                        backgroundColor: gradient,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            backgroundColor: 'rgba(0, 0, 0, 0.8)',
                            padding: 12,
                            titleFont: { size: 14, weight: 'bold' },
                            bodyFont: { size: 13 },
                            callbacks: {
                                label: function(context) {
                                    return `평균: ${context.parsed.y.toLocaleString()} 만원`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: { 
                                color: 'rgba(255, 255, 255, 0.5)',
                                callback: function(value) { return value.toLocaleString() + '만'; }
                            }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: 'rgba(255, 255, 255, 0.5)' }
                        }
                    }
                }
            });
        }

        // Search Filter
        document.getElementById('table-search').addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            const filtered = rawData.filter(d => 
                d.아파트명.toLowerCase().includes(keyword) || 
                d.법정동.toLowerCase().includes(keyword)
            );
            renderTable(filtered);
        });

        // Initial Load
        window.onload = loadData;
    </script>
</body>
</html>
