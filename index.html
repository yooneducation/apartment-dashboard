<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 동네 아파트 실거래가 대시보드</title>
    <!-- Tailwind CSS for Layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- PapaParse for CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #0a0a0c;
            color: #ffffff;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.15) 0%, transparent 40%);
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
        }

        .text-glow-blue {
            text-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        select option {
            background: #1f2937;
            color: white;
        }

        .rank-gold { color: #FFD700; filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.5)); }
        .rank-silver { color: #C0C0C0; filter: drop-shadow(0 0 5px rgba(192, 192, 192, 0.5)); }
        .rank-bronze { color: #CD7F32; filter: drop-shadow(0 0 5px rgba(205, 127, 50, 0.5)); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="mb-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight text-glow-blue">
                    우리 동네 아파트 <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">실거래가 대시보드</span>
                </h1>
                <p class="text-gray-400 mt-2">법정동별 데이터 분석 및 실시간 가격 랭킹을 제공합니다.</p>
            </div>
            <div class="flex flex-col items-end gap-2">
                <div id="last-update" class="text-sm text-gray-500 bg-white/5 px-4 py-2 rounded-full border border-white/10">
                    데이터 로딩 중...
                </div>
            </div>
        </header>

        <!-- Filter Bar -->
        <div class="glass-card p-4 mb-8 flex flex-col md:flex-row gap-4 items-center">
            <div class="flex items-center gap-3 w-full md:w-auto">
                <i data-lucide="map-pin" class="text-purple-400"></i>
                <label for="district-filter" class="text-sm font-semibold text-gray-300 shrink-0">동네 선택</label>
                <select id="district-filter" class="w-full md:w-64 bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-purple-500 transition-all cursor-pointer hover:bg-white/10">
                    <option value="all">전체보기</option>
                </select>
            </div>
            <div class="hidden md:block h-8 w-px bg-white/10"></div>
            <div class="flex items-center gap-3 w-full md:w-auto flex-1">
                <i data-lucide="search" class="text-blue-400"></i>
                <input type="text" id="table-search" placeholder="아파트 이름으로 검색..." 
                       class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-blue-500 transition-all">
            </div>
        </div>

        <!-- Loading State -->
        <div id="loading-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
            <div class="flex flex-col items-center gap-4">
                <div class="loading-spinner"></div>
                <p class="text-blue-400 font-medium">데이터를 분석하고 있습니다...</p>
            </div>
        </div>

        <!-- Summary Stats -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="glass-card p-6 flex flex-col items-start transition-transform hover:scale-[1.02]">
                <div class="p-3 rounded-xl bg-blue-500/10 text-blue-400 mb-4">
                    <i data-lucide="bar-chart-3"></i>
                </div>
                <span class="text-gray-400 text-sm">거래 건수</span>
                <div id="stat-total-count" class="text-2xl font-bold mt-1">- 건</div>
            </div>
            <div class="glass-card p-6 flex flex-col items-start transition-transform hover:scale-[1.02]">
                <div class="p-3 rounded-xl bg-purple-500/10 text-purple-400 mb-4">
                    <i data-lucide="trending-up"></i>
                </div>
                <span class="text-gray-400 text-sm">평균 거래 금액</span>
                <div id="stat-avg-price" class="text-2xl font-bold mt-1">- 만원</div>
            </div>
            <div class="glass-card p-6 flex flex-col items-start border-blue-500/30 transition-transform hover:scale-[1.02]">
                <div class="p-3 rounded-xl bg-blue-600/20 text-blue-300 mb-4">
                    <i data-lucide="award"></i>
                </div>
                <span class="text-gray-400 text-sm">최고 거래가</span>
                <div id="stat-max-price" class="text-2xl font-bold mt-1 text-blue-400">- 만원</div>
            </div>
            <div class="glass-card p-6 flex flex-col items-start border-purple-500/30 transition-transform hover:scale-[1.02]">
                <div class="p-3 rounded-xl bg-purple-600/20 text-purple-300 mb-4">
                    <i data-lucide="arrow-down-circle"></i>
                </div>
                <span class="text-gray-400 text-sm">최저 거래가</span>
                <div id="stat-min-price" class="text-2xl font-bold mt-1 text-purple-400">- 만원</div>
            </div>
        </div>

        <!-- Main Content Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-8">
            <!-- Chart Container -->
            <div class="lg:col-span-2 glass-card p-6">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-xl font-bold flex items-center gap-2">
                        <i data-lucide="line-chart" class="text-blue-400"></i> <span id="chart-title">최근 6개월 평균 거래가격 추이</span>
                    </h3>
                </div>
                <div class="h-[350px] w-full">
                    <canvas id="priceChart"></canvas>
                </div>
            </div>

            <!-- Right Column: Rankings -->
            <div class="space-y-8">
                <!-- Expensive TOP 5 -->
                <div class="glass-card p-6 overflow-hidden">
                    <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
                        <i data-lucide="trophy" class="text-yellow-400"></i> 우리 동네 비싼 아파트 <span class="text-yellow-500">TOP 5</span>
                    </h3>
                    <div id="price-ranking-list" class="space-y-3">
                        <!-- Dynamic content -->
                    </div>
                </div>

                <!-- Popular Complexes -->
                <div class="glass-card p-6 overflow-hidden">
                    <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
                        <i data-lucide="pie-chart" class="text-purple-400"></i> 인기 단지 상위
                    </h3>
                    <div id="top-apartments" class="space-y-4">
                        <!-- Dynamic content -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Data Table -->
        <div class="glass-card overflow-hidden">
            <div class="p-6 border-b border-white/10">
                <h3 class="text-xl font-bold flex items-center gap-2">
                    <i data-lucide="list" class="text-blue-400"></i> 상세 거래 내역
                </h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm border-separate border-spacing-0">
                    <thead>
                        <tr class="bg-white/5 text-gray-400">
                            <th class="p-4 font-semibold border-b border-white/10">거래일자</th>
                            <th class="p-4 font-semibold border-b border-white/10">아파트명</th>
                            <th class="p-4 font-semibold border-b border-white/10">법정동</th>
                            <th class="p-4 font-semibold text-right border-b border-white/10">전용면적(㎡)</th>
                            <th class="p-4 font-semibold text-center border-b border-white/10">층</th>
                            <th class="p-4 font-semibold text-right border-b border-white/10">거래금액(만원)</th>
                            <th class="p-4 font-semibold text-center border-b border-white/10">건축년도</th>
                        </tr>
                    </thead>
                    <tbody id="transaction-table-body" class="divide-y divide-white/5">
                        <!-- Table rows injected here -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Footer -->
        <footer class="mt-16 pb-8 text-center border-t border-white/5 pt-8 text-gray-500 text-sm">
            <p>© [윤에듀케이션]. All Rights Reserved.</p>
        </footer>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTIKYIPtsh_fauXfaEROWUVBP74tW51wl1AoBNnisdnE0Jk3BQrxTh937yjgqOH9_ihHuegpdNPBlKR/pub?gid=1844086316&single=true&output=csv';
        
        let rawData = [];
        let priceChart = null;

        // Initialize icons
        lucide.createIcons();

        // Data Fetching
        async function loadData() {
            try {
                Papa.parse(CSV_URL, {
                    download: true,
                    header: true,
                    complete: function(results) {
                        rawData = results.data.filter(row => row.거래일자 && row.아파트명);
                        
                        // Populate District Filter initially
                        populateDistrictFilter(rawData);
                        
                        // Initial Render
                        applyFiltersAndRender();
                        
                        document.getElementById('loading-overlay').classList.add('hidden');
                    },
                    error: function(err) {
                        console.error("CSV Loading Error:", err);
                    }
                });
            } catch (error) {
                console.error("Fetch Error:", error);
            }
        }

        function populateDistrictFilter(data) {
            const districtSet = new Set();
            data.forEach(item => {
                if(item.법정동) districtSet.add(item.법정동.trim());
            });

            const sortedDistricts = Array.from(districtSet).sort();
            const filterEl = document.getElementById('district-filter');
            
            sortedDistricts.forEach(district => {
                const option = document.createElement('option');
                option.value = district;
                option.textContent = district;
                filterEl.appendChild(option);
            });
        }

        function formatPrice(val) {
            const price = parseInt(val.toString().replace(/,/g, ''));
            if (price >= 10000) {
                const uk = Math.floor(price / 10000);
                const man = price % 10000;
                return man === 0 ? `${uk}억` : `${uk}억 ${man.toLocaleString()}`;
            }
            return `${price.toLocaleString()}`;
        }

        function applyFiltersAndRender() {
            const districtValue = document.getElementById('district-filter').value;
            const searchValue = document.getElementById('table-search').value.toLowerCase();

            let filtered = rawData;

            // 1. Filter by District
            if (districtValue !== 'all') {
                filtered = filtered.filter(d => d.법정동.trim() === districtValue);
                document.getElementById('chart-title').innerText = `${districtValue} 최근 6개월 평균 거래가격 추이`;
            } else {
                document.getElementById('chart-title').innerText = `전체 지역 최근 6개월 평균 거래가격 추이`;
            }

            // 2. Filter by Search Keyword
            if (searchValue) {
                filtered = filtered.filter(d => d.아파트명.toLowerCase().includes(searchValue));
            }

            renderDashboard(filtered);
        }

        function renderDashboard(data) {
            // Stats Update
            if (data.length > 0) {
                const prices = data.map(d => parseInt(d['거래금액(만원)'].replace(/,/g, ''))).filter(p => !isNaN(p));
                const avgPrice = Math.round(prices.reduce((a, b) => a + b, 0) / prices.length);
                const maxPrice = Math.max(...prices);
                const minPrice = Math.min(...prices);

                document.getElementById('stat-total-count').innerText = `${data.length.toLocaleString()} 건`;
                document.getElementById('stat-avg-price').innerText = `${formatPrice(avgPrice)}`;
                document.getElementById('stat-max-price').innerText = `${formatPrice(maxPrice)}`;
                document.getElementById('stat-min-price').innerText = `${formatPrice(minPrice)}`;
            } else {
                ['stat-total-count', 'stat-avg-price', 'stat-max-price', 'stat-min-price'].forEach(id => {
                    document.getElementById(id).innerText = "데이터 없음";
                });
            }
            
            document.getElementById('last-update').innerText = `최종 업데이트: ${new Date().toLocaleDateString()}`;

            // Tables & Charts & Rankings
            renderTable(data);
            renderTopApts(data);
            renderPriceRanking(data);
            renderChart(data);
        }

        function renderPriceRanking(data) {
            const rankingContainer = document.getElementById('price-ranking-list');
            
            if (data.length === 0) {
                rankingContainer.innerHTML = `<p class="text-gray-500 text-sm py-4">순위 데이터가 없습니다.</p>`;
                return;
            }

            // Sort by price descending
            const sortedByPrice = [...data].sort((a, b) => {
                const priceA = parseInt(a['거래금액(만원)'].replace(/,/g, ''));
                const priceB = parseInt(b['거래금액(만원)'].replace(/,/g, ''));
                return priceB - priceA;
            }).slice(0, 5);

            rankingContainer.innerHTML = sortedByPrice.map((d, index) => {
                const rank = index + 1;
                let rankStyle = "text-gray-400";
                let icon = "";
                
                if(rank === 1) { rankStyle = "rank-gold"; icon = '<i data-lucide="medal" class="w-4 h-4"></i>'; }
                else if(rank === 2) { rankStyle = "rank-silver"; icon = '<i data-lucide="medal" class="w-4 h-4"></i>'; }
                else if(rank === 3) { rankStyle = "rank-bronze"; icon = '<i data-lucide="medal" class="w-4 h-4"></i>'; }
                else { icon = `<span class="w-4 text-center font-bold text-xs">${rank}</span>`; }

                const priceValue = parseInt(d['거래금액(만원)'].replace(/,/g, ''));

                return `
                    <div class="group flex items-center gap-4 p-3 bg-white/5 rounded-2xl border border-white/5 hover:bg-white/10 transition-all duration-300">
                        <div class="flex-shrink-0 flex items-center justify-center w-8 h-8 rounded-full bg-white/5 ${rankStyle}">
                            ${icon}
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-start mb-1">
                                <h4 class="font-bold text-sm text-gray-200 truncate group-hover:text-blue-300 transition-colors">${d.아파트명}</h4>
                                <span class="text-sm font-extrabold ${rank <= 3 ? rankStyle : 'text-blue-400'}">
                                    ${formatPrice(priceValue)}
                                </span>
                            </div>
                            <div class="flex gap-2 text-[11px] text-gray-500">
                                <span class="bg-white/5 px-1.5 py-0.5 rounded">${d['전용면적(㎡)']}㎡</span>
                                <span class="bg-white/5 px-1.5 py-0.5 rounded">${d.층}층</span>
                                <span class="truncate">${d.법정동}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            lucide.createIcons();
        }

        function renderTable(data) {
            const tbody = document.getElementById('transaction-table-body');
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="p-8 text-center text-gray-500">조건에 맞는 거래 내역이 없습니다.</td></tr>`;
                return;
            }
            tbody.innerHTML = data.map(d => {
                const priceValue = parseInt(d['거래금액(만원)'].replace(/,/g, ''));
                const priceClass = priceValue >= 50000 ? 'text-red-400 font-extrabold' : 'text-blue-400 font-bold';
                
                return `
                    <tr class="hover:bg-white/10 odd:bg-white/[0.02] even:bg-transparent transition-all duration-200 group">
                        <td class="p-4 text-gray-400 font-mono">${d.거래일자}</td>
                        <td class="p-4 font-semibold text-white group-hover:text-blue-300 transition-colors">${d.아파트명}</td>
                        <td class="p-4 text-gray-400">${d.법정동}</td>
                        <td class="p-4 text-right">${d['전용면적(㎡)']}</td>
                        <td class="p-4 text-center text-gray-500">${d.층}층</td>
                        <td class="p-4 text-right ${priceClass}">${priceValue.toLocaleString()}</td>
                        <td class="p-4 text-center text-gray-500">${d.건축년도}</td>
                    </tr>
                `;
            }).join('');
        }

        function renderTopApts(data) {
            const aptCounts = {};
            data.forEach(d => {
                aptCounts[d.아파트명] = (aptCounts[d.아파트명] || 0) + 1;
            });
            const topApts = Object.entries(aptCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 5);

            const aptContainer = document.getElementById('top-apartments');
            if (topApts.length === 0) {
                aptContainer.innerHTML = `<p class="text-gray-500 text-sm py-4">순위 데이터가 없습니다.</p>`;
                return;
            }
            aptContainer.innerHTML = topApts.map(([name, count]) => `
                <div class="flex items-center justify-between p-3 bg-white/5 rounded-xl border border-white/5 hover:bg-white/10 transition-colors cursor-default">
                    <span class="font-medium text-gray-300 truncate mr-2 text-sm">${name}</span>
                    <span class="bg-purple-500/20 text-purple-400 text-[10px] px-2 py-1 rounded-md font-bold uppercase tracking-wider">${count}건 거래</span>
                </div>
            `).join('');
        }

        function renderChart(data) {
            const monthlyData = {};
            data.forEach(d => {
                const dateStr = d.거래일자.replace(/[^0-9]/g, '');
                if (dateStr.length >= 6) {
                    const monthKey = dateStr.substring(0, 4) + '-' + dateStr.substring(4, 6);
                    if (!monthlyData[monthKey]) {
                        monthlyData[monthKey] = { total: 0, count: 0 };
                    }
                    const price = parseInt(d['거래금액(만원)'].replace(/,/g, ''));
                    if (!isNaN(price)) {
                        monthlyData[monthKey].total += price;
                        monthlyData[monthKey].count += 1;
                    }
                }
            });

            // Get all months and sort
            const allMonths = Object.keys(monthlyData).sort();
            
            // Slice the last 6 months
            const recentMonths = allMonths.slice(-6);
            
            const labels = recentMonths;
            const values = recentMonths.map(m => Math.round(monthlyData[m].total / monthlyData[m].count));

            if (priceChart) priceChart.destroy();

            const ctx = document.getElementById('priceChart').getContext('2d');
            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(59, 130, 246, 0.4)');
            gradient.addColorStop(1, 'rgba(59, 130, 246, 0)');

            priceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '평균 거래가 (만원)',
                        data: values,
                        borderColor: '#3b82f6',
                        borderWidth: 3,
                        pointBackgroundColor: '#3b82f6',
                        pointBorderColor: '#ffffff',
                        pointBorderWidth: 2,
                        pointHoverRadius: 8,
                        fill: true,
                        backgroundColor: gradient,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(0, 0, 0, 0.9)',
                            padding: 15,
                            titleFont: { size: 14, weight: 'bold' },
                            bodyFont: { size: 14 },
                            callbacks: {
                                label: function(context) {
                                    return `평균: ${context.parsed.y.toLocaleString()} 만원`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: { 
                                color: 'rgba(255, 255, 255, 0.5)',
                                callback: value => value.toLocaleString() + '만'
                            }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: 'rgba(255, 255, 255, 0.5)' }
                        }
                    }
                }
            });
        }

        // Event Listeners
        document.getElementById('district-filter').addEventListener('change', applyFiltersAndRender);
        document.getElementById('table-search').addEventListener('input', applyFiltersAndRender);

        // Initial Load
        window.onload = loadData;
    </script>
</body>
</html>
